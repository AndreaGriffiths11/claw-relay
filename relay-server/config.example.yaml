server:
  port: 9333  # Don't use 9222 — that's Chrome's CDP port
  host: "127.0.0.1"  # change to "0.0.0.0" to allow remote connections

agents:
  deploy-bot:
    token: "crly_CHANGE_ME_use_bunx_claw_relay_to_auto_generate"
    scopes: ["read", "interact", "navigate"]
    allowlist: ["dash.cloudflare.com", "github.com"]
    rateLimit: 30

  research-bot:
    token: "crly_CHANGE_ME_use_bunx_claw_relay_to_auto_generate"
    scopes: ["read"]
    allowlist: ["*"]
    rateLimit: 60

blocklist:
  - "*.bank.com"
  - "mail.google.com"
  - "accounts.google.com"

audit:
  logFile: "./audit.jsonl"
  logToStdout: true

engine:
  timeout: 30000

dashboard:
  port: 9334
  adminToken: "crly_CHANGE_ME_use_bunx_claw_relay_to_auto_generate"
