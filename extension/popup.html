<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 400px;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0f6fc;
    }
    .header h1 span { color: #ff7b72; }
    .status-section {
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #39d353; box-shadow: 0 0 6px #39d35366; }
    .dot.red { background: #ff7b72; box-shadow: 0 0 6px #ff7b7266; }
    .dot.blue { background: #58a6ff; box-shadow: 0 0 6px #58a6ff66; }
    .status-label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-value { color: #f0f6fc; font-weight: 500; }
    .agent-info {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
    }
    .agent-info .label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .agent-name { color: #f0f6fc; font-weight: 600; font-size: 14px; }
    .scopes { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .scope-tag {
      background: #1f2937;
      color: #39d353;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      border: 1px solid #30363d;
    }

    /* ── Bridge section ─────────────────────────────── */
    .bridge-section {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
    }
    .bridge-section .label {
      color: #8b949e;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .bridge-ws-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .bridge-ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .bridge-btn {
      padding: 4px 10px;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: #161b22;
      color: #c9d1d9;
      font-size: 11px;
      cursor: pointer;
    }
    .bridge-btn:hover { border-color: #58a6ff; color: #f0f6fc; }
    .bridge-btn.danger { border-color: #ff7b72; color: #ff7b72; }
    .bridge-btn.danger:hover { background: #ff7b7222; }

    .attach-btn {
      width: 100%;
      padding: 8px;
      border: 1px solid #58a6ff;
      border-radius: 6px;
      background: #58a6ff11;
      color: #58a6ff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .attach-btn:hover { background: #58a6ff22; }
    .attach-btn.detach { border-color: #ff7b72; color: #ff7b72; background: #ff7b7211; }
    .attach-btn.detach:hover { background: #ff7b7222; }

    .tab-list { list-style: none; }
    .tab-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #161b22;
    }
    .tab-item:last-child { border-bottom: none; }
    .tab-info {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex: 1;
    }
    .tab-favicon {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
    }
    .tab-detach-btn {
      padding: 2px 6px;
      border: 1px solid #30363d;
      border-radius: 3px;
      background: transparent;
      color: #8b949e;
      font-size: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .tab-detach-btn:hover { border-color: #ff7b72; color: #ff7b72; }

    /* ── Actions + controls (original) ──────────────── */
    .actions-section {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
    }
    .actions-section .label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .action-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #161b22;
    }
    .action-item:last-child { border-bottom: none; }
    .action-type { font-weight: 500; color: #c9d1d9; }
    .action-target { color: #8b949e; font-size: 11px; margin-left: 6px; }
    .action-right { display: flex; align-items: center; gap: 6px; }
    .action-status { font-size: 11px; font-weight: 500; }
    .action-status.ok { color: #39d353; }
    .action-status.error { color: #ff7b72; }
    .action-time { color: #484f58; font-size: 10px; }
    .empty { color: #484f58; font-style: italic; padding: 12px 0; text-align: center; }
    .controls {
      padding: 14px 16px;
    }
    .toggle-btn {
      width: 100%;
      padding: 8px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #161b22;
      color: #c9d1d9;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn:hover { border-color: #39d353; color: #f0f6fc; }
    .toggle-btn.paused { border-color: #ff7b72; color: #ff7b72; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦞 Claw <span>Relay</span></h1>
    <div class="status-row">
      <div id="statusDot" class="dot red"></div>
      <span id="statusText" class="status-value">Offline</span>
    </div>
  </div>

  <div class="status-section">
    <div class="status-row">
      <span class="status-label">Relay</span>
      <span id="relayUrlDisplay" class="status-value" style="font-size:11px;color:#8b949e;word-break:break-all;">ws://localhost:9333</span>
    </div>
  </div>

  <div class="agent-info" id="agentSection">
    <div class="label">Connected Agent</div>
    <div class="agent-name" id="agentName">—</div>
    <div class="scopes" id="agentScopes"></div>
  </div>

  <!-- Bridge section -->
  <div class="bridge-section">
    <div class="label">Tab Bridge</div>
    <div class="bridge-ws-row">
      <div class="bridge-ws-status">
        <div id="bridgeDot" class="dot red"></div>
        <span id="bridgeStatus">Disconnected</span>
      </div>
      <button id="bridgeConnectBtn" class="bridge-btn">Connect</button>
    </div>
    <button id="attachBtn" class="attach-btn">🔗 Attach This Tab</button>
    <ul id="attachedTabsList" class="tab-list"></ul>
  </div>

  <div class="actions-section">
    <div class="label">Recent Actions</div>
    <div id="actionsList">
      <div class="empty">No actions yet</div>
    </div>
  </div>

  <div class="controls">
    <button class="toggle-btn" id="toggleBtn">Pause Relay</button>
    <div style="display:flex;justify-content:center;gap:16px;margin-top:10px">
      <a href="#" id="dashboardLink" style="color:#8b949e;font-size:12px;text-decoration:none;">📊 Dashboard</a>
      <a href="#" id="settingsLink" style="color:#8b949e;font-size:12px;text-decoration:none;">⚙ Settings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
