<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; background: #1a1a2e; color: #e0e0e0; }
    h1 { font-size: 16px; margin-bottom: 12px; color: #fff; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .indicator { width: 12px; height: 12px; border-radius: 50%; }
    .indicator.on { background: #00e676; box-shadow: 0 0 8px #00e676; }
    .indicator.off { background: #ff5252; }
    .toggle { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .toggle.on { background: #00e676; color: #1a1a2e; }
    .toggle.off { background: #333; color: #e0e0e0; }
    .info { margin-top: 12px; font-size: 12px; color: #888; }
    .info p { margin: 4px 0; }
    .actions { margin-top: 12px; }
    .actions h3 { font-size: 12px; color: #666; margin-bottom: 4px; }
    .action-item { font-size: 11px; color: #aaa; padding: 2px 0; font-family: monospace; }
  </style>
</head>
<body>
  <h1>🦀 Claw Relay</h1>
  <div class="status">
    <div class="indicator off" id="indicator"></div>
    <span id="statusText">Disconnected</span>
  </div>
  <button class="toggle off" id="toggleBtn">Enable Relay</button>
  <div class="info">
    <p>Agent: <span id="agentName">—</span></p>
    <p>Page: <span id="currentUrl">—</span></p>
  </div>
  <div class="actions">
    <h3>Recent Actions</h3>
    <div id="actionList"><div class="action-item">No actions yet</div></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
