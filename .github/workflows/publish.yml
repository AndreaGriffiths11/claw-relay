name: Publish to npm

on:
  release:
    types: [published]

# Provenance requires id-token write permission for OIDC attestation.
# This proves the package was built in this CI pipeline, not on a
# developer's machine — users can verify with `npm audit signatures`.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Install and build
      - run: cd relay-server && npm ci
      - run: cd relay-server/dashboard && npm ci && npm run build
      - run: npm run build

      # Publish with provenance — generates a signed attestation
      # linking this package version to this exact commit and workflow run
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
