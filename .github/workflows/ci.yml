name: CI

on:
  push:
    branches: [main]
  pull_request:

# Restrict GITHUB_TOKEN permissions to read-only by default
permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay-server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc --noEmit

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - run: cd relay-server && npm ci && npm audit --omit=dev
      - run: cd mcp && npm ci && npm audit --omit=dev

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay-server/dashboard
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - run: npm ci
      - run: node --check claw-relay-mcp.js
