name: Bug Report
description: Report a bug in Claw Relay
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start the relay with `npx claw-relay`
        2. Connect agent with...
        3. Run action...
        4. See error...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Relay Server
        - Chrome Extension
        - MCP Server
        - OpenClaw Skill
        - Dashboard
        - Documentation
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser version
      placeholder: |
        OS: macOS 15.1
        Node: v22.x
        Chrome: 146.x
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output or audit log entries
      render: shell
    validations:
      required: false
